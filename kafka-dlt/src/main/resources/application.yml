spring:
  application:
    name: kafka-dlt
  kafka:
    consumer:
      group-id: kafka-dlt-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        metadata.max.age.ms: 10000
  threads:
    virtual:
      enabled: true

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

kafka:
  dlt:
    threshold:
      check-interval: 60000
      window-minutes: 60      # 전역 기본값
      max-count: 10           # 전역 기본값
      # 토픽별 임계치 오버라이드 예시:
      # topics:
      #   order-events:
      #     max-count: 5
      #     window-minutes: 30
      #   payment-events:
      #     max-count: 20
    max-retry-count: 3

slack:
  error-log:
    stacktrace-lines: 5
    rate-limit-seconds: 60
