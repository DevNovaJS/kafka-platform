spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
  mongodb:
    uri: ${MONGODB_URI}

slack:
  webhook:
    url: ${SLACK_WEBHOOK_URL}   # 운영에서는 필수

kafka:
  listener:
    activity:
      concurrency: ${KAFKA_ACTIVITY_CONCURRENCY:3}
      ack-mode: ${KAFKA_ACTIVITY_ACK_MODE:BATCH}
      sync-commits: ${KAFKA_ACTIVITY_SYNC_COMMITS:true}
      poll-timeout: ${KAFKA_ACTIVITY_POLL_TIMEOUT:5000}
      batch-listener: ${KAFKA_ACTIVITY_BATCH_LISTENER:false}
